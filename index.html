<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Radio Papa" />
  <title>Radio Papa</title>

  <style>
    :root {
      --bg: #111111;
      --panel: #1f1f1f;
      --text: #ffffff;
      --button: #ffffff;
      --button-text: #111111;
      --active: #0b7a35;
      --stop: #b00020;
      --focus: #ffd700;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 22px;
      padding-top: max(22px, env(safe-area-inset-top));
      padding-bottom: max(22px, env(safe-area-inset-bottom));
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
    }

    main {
      max-width: 620px;
      margin: 0 auto;
    }

    h1 {
      font-size: 34px;
      line-height: 1.15;
      margin: 8px 0 10px;
    }

    .hint {
      font-size: 20px;
      line-height: 1.35;
      margin: 0 0 22px;
      color: #eeeeee;
    }

    .station-button,
    .stop-button {
      display: block;
      width: 100%;
      min-height: 86px;
      margin: 16px 0;
      padding: 22px 18px;
      border: 0;
      border-radius: 18px;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .station-button {
      background: var(--button);
      color: var(--button-text);
    }

    .station-button.current {
      background: var(--active);
      color: #ffffff;
    }

    .stop-button {
      background: var(--stop);
      color: #ffffff;
      margin-top: 24px;
    }

    button:focus,
    button:focus-visible {
      outline: 7px solid var(--focus);
      outline-offset: 4px;
    }

    #statusBox {
      margin-top: 24px;
      padding: 20px;
      background: var(--panel);
      border-radius: 16px;
      text-align: left;
    }

    #statusLabel {
      display: block;
      font-size: 18px;
      color: #cccccc;
      margin-bottom: 6px;
    }

    #status {
      font-size: 25px;
      font-weight: 700;
      line-height: 1.3;
      margin: 0;
    }

    audio {
      width: 100%;
      margin-top: 18px;
      height: 54px;
    }

    .small {
      font-size: 16px;
      line-height: 1.35;
      color: #dddddd;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <main>
    <h1>Radio Papa</h1>
    <p class="hint">Kies een zender. De radio start direct.</p>

    <button class="station-button" id="btn-radio1"
      onclick="playRadio('Radio 1', 'https://icecast.omroep.nl/radio1-bb-mp3')"
      aria-label="Speel Radio 1">
      1. Radio 1
    </button>

    <button class="station-button" id="btn-gelderland"
      onclick="playRadio('Radio Gelderland', 'https://stream.omroepgelderland.nl/radiogelderland')"
      aria-label="Speel Radio Gelderland">
      2. Radio Gelderland
    </button>

    <button class="station-button" id="btn-m-utrecht"
      onclick="playRadio('Radio M Utrecht', 'https://media.rtvutrecht.nl/radiomutrecht-bb-mp3')"
      aria-label="Speel Radio M Utrecht">
      3. Radio M Utrecht
    </button>

    <button class="station-button" id="btn-radio10gold"
      onclick="playRadio('Radio 10 Gold', 'https://playerservices.streamtheworld.com/api/livestream-redirect/TLPSTR18.mp3')"
      aria-label="Speel Radio 10 Gold">
      4. Radio 10 Gold
    </button>

    <button class="station-button" id="btn-radionl"
      onclick="playRadio('Radio NL', 'https://stream.radionl.fm/radionl')"
      aria-label="Speel Radio NL">
      5. Radio NL
    </button>

    <button class="stop-button" onclick="stopRadio()" aria-label="Stop de radio">
      Stop
    </button>

    <section id="statusBox" aria-live="polite" aria-atomic="true">
      <span id="statusLabel">Status</span>
      <p id="status">Kies een zender</p>
    </section>

    <audio id="player" controls preload="none" aria-label="Audiospeler"></audio>

    <p class="small">
      Tip: stream het geluid via AirPlay naar de Bose SoundTouch.
      Voeg deze pagina op de iPhone toe aan het beginscherm voor gebruik als app.
    </p>
  </main>

  <script>
    const player = document.getElementById('player');
    const statusText = document.getElementById('status');
    const buttons = Array.from(document.querySelectorAll('.station-button'));

    function clearCurrentButton() {
      buttons.forEach(button => button.classList.remove('current'));
    }

    async function playRadio(name, url) {
      clearCurrentButton();

      const clickedButton = event && event.currentTarget ? event.currentTarget : null;
      if (clickedButton) clickedButton.classList.add('current');

      statusText.textContent = name + ' wordt gestart';

      try {
        player.pause();
        player.src = url;
        player.load();
        await player.play();
        statusText.textContent = name + ' speelt nu';
      } catch (error) {
        statusText.textContent = 'Starten lukt niet. Tik nog een keer op ' + name + ', of controleer internet.';
      }
    }

    function stopRadio() {
      clearCurrentButton();
      player.pause();
      player.removeAttribute('src');
      player.load();
      statusText.textContent = 'Radio gestopt';
    }
  </script>
</body>
</html>
